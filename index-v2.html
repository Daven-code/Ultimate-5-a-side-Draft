<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ultimate 5-a-side Draft Game</title>

    <link rel="stylesheet" href="styles-v2.css">

</head>

<body>

    <!-- ==========================================================
         BACKGROUND
    =========================================================== -->

    <div class="background-glow glow-one"></div>
    <div class="background-glow glow-two"></div>

    <!-- ==========================================================
         APPLICATION
    =========================================================== -->

    <div id="app">

        <!-- ======================================================
             HEADER
        ======================================================= -->

        <header class="app-header">

            <div class="header-left">

                <img
                    src="Ultimate 5-a-side LOGO.png"
                    alt="Ultimate 5-a-side Logo"
                    class="app-logo">

                <div>

                    <h1>Ultimate 5-a-side Draft Game</h1>

                    <p class="header-subtitle">
                        Build your ultimate five-a-side team.
                    </p>

                </div>

            </div>

            <div class="header-right">

                <button
                    id="leaderboardBtn"
                    class="btn btn-primary">

                    🏆 Leaderboard

                </button>

                <button
                    id="resetBtn"
                    class="btn btn-secondary hidden">

                    Reset Game

                </button>

            </div>

        </header>

        <!-- ======================================================
             MAIN
        ======================================================= -->

        <main id="mainContent">

            <!-- ==============================================
                 HOME SCREEN
            =============================================== -->

            <section
                id="homeScreen"
                class="screen active">

            </section>

            <!-- ==============================================
                 CHALLENGE SCREEN
            =============================================== -->

            <section
                id="challengeScreen"
                class="screen hidden">

            </section>

            <!-- ==============================================
                 GAME SCREEN
            =============================================== -->

            <section
                id="gameScreen"
                class="screen hidden">

            </section>

            <!-- ==============================================
                 RESULTS SCREEN
            =============================================== -->

            <section
                id="resultsScreen"
                class="screen hidden">

            </section>

            <!-- ==============================================
                 LEADERBOARD SCREEN
            =============================================== -->

            <section
                id="leaderboardScreen"
                class="screen hidden">

            </section>

        </main>

        <!-- ======================================================
             FOOTER
        ======================================================= -->

        <footer class="app-footer">

            <p>

                Ultimate 5-a-side Draft Game

                <span id="versionText"></span>

            </p>

        </footer>

    </div>

    <!-- ==========================================================
         APPLICATION SCRIPT
    =========================================================== -->

    <script src="app-v2.js"></script>

</body>

</html>
